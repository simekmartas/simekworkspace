<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Přihlášení - Mobil Maják</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: var(--terminal-bg);
            color: var(--terminal-green);
            font-family: 'JetBrains Mono', monospace;
        }
        
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(45deg, var(--terminal-bg) 0%, #1a1a1a 100%);
        }
        
        .login-box {
            background: var(--terminal-bg);
            border: 2px solid var(--terminal-pink);
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 
                0 0 20px rgba(255, 20, 147, 0.4),
                0 0 40px rgba(0, 255, 65, 0.2);
            position: relative;
        }
        
        .login-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--terminal-pink), var(--terminal-green), var(--terminal-blue));
            z-index: -1;
            border-radius: 4px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            color: var(--terminal-pink);
            font-size: 14px;
            text-transform: uppercase;
            font-weight: 700;
        }
        
        .form-input {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--terminal-green);
            color: var(--terminal-white);
            padding: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--terminal-pink);
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
            background: rgba(0, 0, 0, 0.9);
        }
        
        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .login-button {
            background: linear-gradient(45deg, var(--terminal-pink), var(--terminal-green));
            color: var(--terminal-bg);
            border: none;
            padding: 15px 24px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 5px 15px rgba(255, 20, 147, 0.4),
                0 0 30px rgba(0, 255, 65, 0.3);
        }
        
        .login-button:active {
            transform: translateY(0);
        }
        
        .error-message {
            color: var(--terminal-red);
            font-size: 14px;
            margin-top: 10px;
            display: none;
            padding: 10px;
            border: 1px solid var(--terminal-red);
            background: rgba(255, 0, 64, 0.1);
        }
        
        .demo-accounts {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 20, 147, 0.3);
        }
        
        .demo-title {
            color: var(--terminal-blue);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.8;
        }
        
        .demo-account {
            color: var(--terminal-green);
            font-size: 12px;
            margin: 5px 0;
            opacity: 0.7;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        
        .demo-account:hover {
            opacity: 1;
            color: var(--terminal-pink);
        }
        
        h1 {
            color: var(--terminal-green);
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }
        
        h1 span {
            color: var(--terminal-pink);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1 style="color: var(--terminal-green); margin-bottom: 30px; text-align: center;">
                &gt; MOBIL MAJÁK_<br>
                <span style="font-size: 16px; opacity: 0.7;">// PŘIHLÁŠENÍ</span>
            </h1>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Uživatelské jméno</label>
                    <input type="text" id="username" name="username" class="form-input" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Heslo</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>
                
                <button type="submit" class="login-button">Přihlásit se</button>
                
                <div class="error-message" id="errorMessage"></div>
            </form>
            
            <div class="demo-accounts">
                <div class="demo-title">// Testovací účty:</div>
                <div class="demo-account">Admin: admin / admin123</div>
                <div class="demo-account">Prodejce: gabriel / globus123</div>
            </div>
        </div>
    </div>
    
    <div class="version-info">v2.2.0</div>
    
    <script src="auth-new.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            // Skrýt předchozí chybovou hlášku
            errorMessage.style.display = 'none';
            
            try {
                const result = await window.authSystem.login(username, password);
                
                if (result.success) {
                    // Přesměrovat na dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorMessage.textContent = result.message || 'Neplatné přihlašovací údaje';
                    errorMessage.style.display = 'block';
                }
            } catch (error) {
                console.error('Chyba při přihlašování:', error);
                errorMessage.textContent = 'Chyba při přihlašování. Zkuste to prosím později.';
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
